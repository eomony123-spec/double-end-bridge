<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>抽選ツール | 超天才くん</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <main class="container">
    <section id="appPanel" class="panel controls">
      <h2>生成設定</h2>
      <div class="grid">
        <label for="setCount">生成セット数（1〜20）</label>
        <input id="setCount" type="number" min="1" max="20" value="5">

        <label for="doubleBridge">Wブリッジ優先</label>
        <div class="toggle-row">
          <input id="doubleBridge" type="checkbox" checked>
          <span id="doubleBridgeLabel">ON</span>
        </div>
      </div>
      <p id="inputError" class="error" aria-live="polite"></p>
      <div class="actions">
        <button id="generateBtn" type="button">生成</button>
        <button id="copyAllBtn" type="button">全セットをコピー</button>
        <button id="clearHistoryBtn" type="button" class="danger">履歴をクリア</button>
      </div>
      <p id="statusMsg" class="status" aria-live="polite"></p>
    </section>

    <section id="resultsPanel" class="panel">
      <h2>生成結果</h2>
      <div id="results" class="list"></div>
    </section>

    <section id="historyPanel" class="panel">
      <h2>履歴（最新50件）</h2>
      <div id="history" class="history-list"></div>
    </section>
  </main>

  <script src="./app.js"></script>
</body>
</html>
