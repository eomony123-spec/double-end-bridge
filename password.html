<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>認証 | 超天才くん</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <main class="container auth-container">
    <section class="panel auth-panel">
      <h1 class="auth-title">パスワード認証</h1>
      <p class="auth-note">固定パスワードを入力してください。</p>
      <label for="passwordInput">パスワード</label>
      <input id="passwordInput" type="password" autocomplete="current-password">
      <div class="actions">
        <button id="unlockBtn" type="button">抽選画面へ進む</button>
        <button id="backBtn" type="button">トップへ戻る</button>
      </div>
      <p id="authError" class="error" aria-live="polite"></p>
    </section>
  </main>

  <script src="./auth.js"></script>
</body>
</html>
